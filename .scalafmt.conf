version = 3.10.3
runner.dialect = scala213source3
docstrings.style = keep
docstrings.wrap = false
maxColumn = 100
indent.main = 2
indent.callSite = 2
indent.defnSite = 2
align.preset = more
align.openParenCallSite = false

fileOverride {
  "glob:**/src-3/**" {
    runner.dialect = scala3
  }
  "glob:**/test/src-3/**" {
    runner.dialect = scala3
  }
}
